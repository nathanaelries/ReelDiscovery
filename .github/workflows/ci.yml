name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  core-linux:
    name: Core engine (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Build cross-platform core
        run: dotnet build src/ReelDiscovery.Core/ReelDiscovery.Core.csproj -c Release

  solution-windows:
    name: Full solution (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Build solution
        run: dotnet build ReelDiscovery.sln -c Release
