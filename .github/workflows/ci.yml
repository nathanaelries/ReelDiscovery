name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  linux:
    name: Core + Web (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Build cross-platform core
        run: dotnet build src/ReelDiscovery.Core/ReelDiscovery.Core.csproj -c Release
      - name: Build web app
        run: dotnet build src/ReelDiscovery.Web/ReelDiscovery.Web.csproj -c Release

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t reeldiscovery-web .

  solution-windows:
    name: Full solution (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Build solution
        run: dotnet build ReelDiscovery.sln -c Release
